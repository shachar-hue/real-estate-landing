  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  <script type="__bundler/template">"<!DOCTYPE html>\n<html lang=\"he\" dir=\"rtl\"><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width,initial-scale=1\">\n<title>\u05e4\u05e8\u05d9\u05d3\u05d4 \u05e0\u05dc\u05e7\u05df \u00b7 \u05ea\u05d9\u05d5\u05d5\u05da \u05e2\u05e1\u05e7\u05d9\u05dd \u05d5\u05d9\u05e2\u05d5\u05e5 \u05d0\u05e1\u05d8\u05e8\u05d8\u05d2\u05d9</title>\n<link rel=\"preconnect\" href=\"https://fonts.googleapis.com\">\n<link rel=\"preconnect\" href=\"https://fonts.gstatic.com\" crossorigin>\n<link rel=\"stylesheet\" href=\"https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@500;700;900&family=Heebo:wght@300;400;500;600;700;800;900&display=swap\">\n<link rel=\"preconnect\" href=\"https://fonts.gstatic.com\" crossorigin=\"\">\n<style>/* hebrew */\n\n/* latin-ext */\n\n/* latin */\n\n/* hebrew */\n\n/* latin-ext */\n\n/* latin */\n\n/* hebrew */\n\n/* latin-ext */\n\n/* latin */\n\n/* hebrew */\n\n/* math */\n\n/* symbols */\n\n/* latin-ext */\n\n/* latin */\n\n/* hebrew */\n\n/* math */\n\n/* symbols */\n\n/* latin-ext */\n\n/* latin */\n\n/* hebrew */\n\n/* math */\n\n/* symbols */\n\n/* latin-ext */\n\n/* latin */\n\n/* hebrew */\n\n/* math */\n\n/* symbols */\n\n/* latin-ext */\n\n/* latin */\n\n/* hebrew */\n\n/* math */\n\n/* symbols */\n\n/* latin-ext */\n\n/* latin */\n\n/* hebrew */\n\n/* math */\n\n/* symbols */\n\n/* latin-ext */\n\n/* latin */\n\n/* hebrew */\n\n/* math */\n\n/* symbols */\n\n/* latin-ext */\n\n/* latin */\n\n</style>\n\n<style>\n  :root{\n    --navy-900:#1e1b4b;\n    --navy-800:#2a2670;\n    --navy-700:#35307a;\n    --navy-50:#eeedf6;\n    --ink:#1e1b4b;\n    --muted:#6b6585;\n    --line:#e4e2ec;\n    --paper:#f7f6f9;\n    --paper-2:#ecebf3;\n    --red:#e63c50;\n    --red-dark:#c42a3d;\n    --whatsapp:#25d366;\n    --shadow-lg: 0 30px 80px -30px rgba(30,27,75,.4);\n    --shadow-md: 0 12px 30px -12px rgba(30,27,75,.22);\n  }\n  *{box-sizing:border-box}\n  html,body{margin:0;padding:0}\n  body{\n    font-family:'Heebo', system-ui, sans-serif;\n    color:var(--ink);\n    background:var(--paper);\n    font-size:17px;\n    line-height:1.55;\n    -webkit-font-smoothing:antialiased;\n    direction:rtl;\n  }\n  h1,h2,h3,h4{margin:0;font-weight:800;line-height:1.1;letter-spacing:-.01em}\n  p{margin:0}\n  a{color:inherit;text-decoration:none}\n  .display{font-family:'Frank Ruhl Libre', 'Heebo', serif;font-weight:900;letter-spacing:-.02em}\n  .container{max-width:1240px;margin:0 auto;padding:0 28px}\n  .eyebrow{\n    display:inline-flex;align-items:center;gap:10px;\n    font-size:13px;font-weight:600;letter-spacing:.18em;\n    text-transform:uppercase;color:var(--red);\n  }\n  .eyebrow::before{\n    content:\"\";display:inline-block;width:28px;height:2px;background:var(--red);\n  }\n\n  /* \u2500\u2500 Top bar \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */\n  .topbar{\n    position:sticky;top:0;z-index:50;\n    background:rgba(247,246,249,.92);backdrop-filter:saturate(140%) blur(10px);\n    border-bottom:1px solid var(--line);\n  }\n  .topbar-inner{\n    display:flex;align-items:center;justify-content:space-between;\n    padding:18px 0;\n  }\n  .brand{display:flex;align-items:center;gap:14px}\n  .brand-logo{\n    height:46px;width:auto;display:block;\n  }\n  .brand-divider{\n    width:1px;height:34px;background:var(--line);\n  }\n  .brand-text strong{font-size:17px;font-weight:800;color:var(--navy-900);display:block;line-height:1;font-family:'Frank Ruhl Libre',serif}\n  .brand-text small{color:var(--muted);font-size:12px;letter-spacing:.04em;margin-top:4px;display:block}\n  .nav{display:flex;gap:26px;align-items:center}\n  .nav a{font-size:15px;font-weight:500;color:var(--ink);opacity:.85}\n  .nav a:hover{opacity:1;color:var(--red)}\n  .nav .cta{\n    background:var(--navy-900);color:#fff;\n    padding:10px 18px;border-radius:999px;font-weight:600;font-size:14px;\n    display:inline-flex;align-items:center;gap:8px;\n  }\n  .nav .cta:hover{background:var(--red);color:#fff;box-shadow:0 6px 16px -6px rgba(230,60,80,.5)}\n  @media (max-width: 820px){ .nav a:not(.cta){display:none} }\n\n  /* \u2500\u2500 Hero \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */\n  .hero{\n    position:relative;overflow:hidden;\n    padding:64px 0 0;\n  }\n  .hero::before{\n    content:\"\";position:absolute;inset:0;\n    background:\n      radial-gradient(800px 500px at 85% -10%, rgba(230,60,80,.12), transparent 60%),\n      radial-gradient(900px 600px at 10% 110%, rgba(30,27,75,.06), transparent 60%);\n    pointer-events:none;\n  }\n  .hero-grid{\n    position:relative;\n    display:grid;grid-template-columns: 1.05fr .95fr;gap:64px;align-items:end;\n  }\n  @media (max-width: 960px){ .hero-grid{grid-template-columns:1fr; gap:32px} }\n  .hero-copy{padding-bottom:80px}\n  .hero h1{\n    font-size: clamp(44px, 6.2vw, 88px);\n    line-height:1.02;\n    color:var(--navy-900);\n    margin-top:22px;\n  }\n  .hero h1 .accent{\n    color:var(--red);\n    position:relative;display:inline-block;\n  }\n  .hero h1 .accent::after{\n    content:\"\";position:absolute;left:0;right:0;bottom:-6px;height:8px;\n    background:url(\"data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 12' preserveAspectRatio='none'><path d='M2 8 C 50 2, 120 2, 198 9' stroke='%23e63c50' stroke-width='3' fill='none' stroke-linecap='round'/></svg>\") center/100% 100% no-repeat;\n  }\n  .hero-sub{\n    margin-top:28px;font-size:20px;color:var(--muted);max-width:560px;\n  }\n  .hero-actions{\n    margin-top:36px;display:flex;gap:14px;flex-wrap:wrap;\n  }\n  .btn{\n    display:inline-flex;align-items:center;gap:10px;\n    padding:16px 28px;border-radius:999px;font-weight:700;font-size:16px;\n    transition:transform .18s ease, box-shadow .18s ease, background .18s ease;\n    border:1px solid transparent;cursor:pointer;\n  }\n  .btn:hover{transform:translateY(-1px)}\n  .btn-primary{background:var(--red);color:#fff;box-shadow:0 10px 24px -8px rgba(230,60,80,.55)}\n  .btn-primary:hover{background:var(--navy-900)}\n  .btn-ghost{background:transparent;color:var(--navy-900);border-color:var(--navy-900)}\n  .btn-ghost:hover{background:var(--navy-900);color:#fff}\n  .btn-wa{background:var(--whatsapp);color:#fff;box-shadow:0 10px 24px -8px rgba(37,211,102,.55)}\n  .btn-wa:hover{background:#1ebd5a}\n\n  .hero-stats{\n    margin-top:48px;display:flex;gap:36px;flex-wrap:wrap;\n    border-top:1px solid var(--line);padding-top:28px;\n  }\n  .stat strong{display:block;font-family:'Frank Ruhl Libre',serif;font-size:36px;color:var(--navy-900);line-height:1}\n  .stat span{font-size:13px;color:var(--muted);letter-spacing:.06em;text-transform:uppercase}\n\n  /* portrait card */\n  .portrait-wrap{\n    position:relative;\n    padding-bottom:0;\n    align-self:end;\n  }\n  .portrait-card{\n    position:relative;\n    background:linear-gradient(180deg,var(--navy-800),var(--navy-900));\n    border-radius:28px 28px 0 0;\n    overflow:hidden;\n    box-shadow:var(--shadow-lg);\n    aspect-ratio: 4 / 5;\n  }\n  .portrait-card::before{\n    content:\"\";position:absolute;inset:auto -40px -10px auto;width:340px;height:340px;\n    background:radial-gradient(closest-side, rgba(230,60,80,.45), transparent 70%);\n    filter:blur(8px);\n  }\n  .portrait-card img{\n    position:absolute;inset:0;\n    width:100%;height:100%;object-fit:cover;object-position:center 18%;\n    display:block;\n  }\n  .portrait-name{\n    position:absolute;left:24px;bottom:24px;color:#fff;z-index:2;\n    background:rgba(10,26,63,.55);backdrop-filter:blur(6px);\n    border:1px solid rgba(255,255,255,.18);\n    padding:14px 20px;border-radius:16px;\n  }\n  .portrait-name strong{font-family:'Frank Ruhl Libre',serif;font-size:30px;display:block;line-height:1}\n  .portrait-name span{font-size:13px;opacity:.85;letter-spacing:.08em;text-transform:uppercase}\n  .portrait-badge{\n    position:absolute;top:24px;right:24px;z-index:2;\n    background:var(--red);color:#fff;font-weight:700;font-size:13px;letter-spacing:.06em;\n    padding:8px 14px;border-radius:999px;text-transform:uppercase;\n    box-shadow:0 8px 20px -8px rgba(230,60,80,.6);\n  }\n\n  /* \u2500\u2500 Promise band \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */\n  .promise{\n    background:var(--navy-900);color:#fff;\n    padding:36px 0;margin-top:-1px;position:relative;overflow:hidden;\n  }\n  .promise::before{\n    content:\"\";position:absolute;inset:0;background:\n      radial-gradient(600px 200px at 90% 50%, rgba(230,60,80,.28), transparent 60%);\n    pointer-events:none;\n  }\n  .promise-inner{\n    display:grid;grid-template-columns:repeat(3,1fr);gap:24px;align-items:center;\n    position:relative;\n  }\n  @media (max-width:820px){ .promise-inner{grid-template-columns:1fr;text-align:center} }\n  .promise-item{display:flex;gap:14px;align-items:center;justify-content:flex-start}\n  @media (max-width:820px){ .promise-item{justify-content:center} }\n  .promise-icon{\n    width:44px;height:44px;border-radius:12px;display:grid;place-items:center;\n    background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);flex:0 0 44px;\n  }\n  .promise-item strong{display:block;font-size:15px}\n  .promise-item span{font-size:13px;opacity:.7}\n\n  /* \u2500\u2500 Section base \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */\n  section{padding:110px 0}\n  .section-head{max-width:760px;margin-bottom:56px}\n  .section-head h2{\n    font-size:clamp(34px,4.2vw,54px);\n    color:var(--navy-900);margin-top:14px;\n  }\n  .section-head p{color:var(--muted);font-size:18px;margin-top:16px;max-width:620px}\n\n  /* \u2500\u2500 Services \u2014 sellers \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */\n  .seller{background:#fff;border-top:1px solid var(--line);border-bottom:1px solid var(--line)}\n  .seller-grid{\n    display:grid;grid-template-columns:repeat(12,1fr);gap:22px;\n  }\n  .seller-card{\n    grid-column:span 4;\n    background:var(--paper);border:1px solid var(--line);\n    border-radius:20px;padding:32px;\n    position:relative;overflow:hidden;\n    transition:transform .25s ease, box-shadow .25s ease, border-color .25s ease;\n  }\n  .seller-card:hover{transform:translateY(-4px);box-shadow:var(--shadow-md);border-color:transparent}\n  @media (max-width:980px){ .seller-card{grid-column:span 6} }\n  @media (max-width:640px){ .seller-card{grid-column:span 12} }\n  .seller-num{\n    font-family:'Frank Ruhl Libre',serif;font-size:60px;color:var(--red);\n    line-height:1;opacity:.9;\n  }\n  .seller-card h3{\n    font-size:22px;color:var(--navy-900);margin:16px 0 10px;\n  }\n  .seller-card p{color:var(--muted);font-size:15.5px}\n  .seller-card.feature{\n    grid-column:span 12;\n    background:var(--navy-900);color:#fff;border-color:transparent;\n    display:grid;grid-template-columns:1.1fr .9fr;gap:32px;align-items:center;\n    padding:44px;\n  }\n  @media (max-width:820px){ .seller-card.feature{grid-template-columns:1fr} }\n  .seller-card.feature .seller-num{color:#fff;opacity:.5}\n  .seller-card.feature h3{color:#fff;font-size:30px;margin-top:10px}\n  .seller-card.feature p{color:rgba(255,255,255,.75);font-size:17px}\n  .feature-mini{\n    display:grid;grid-template-columns:1fr 1fr;gap:14px;padding:0;margin:0;\n  }\n  .feature-mini li{\n    list-style:none;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);\n    border-radius:14px;padding:14px 16px;font-size:14.5px;\n    display:flex;align-items:center;gap:10px;\n  }\n  .feature-mini li::before{\n    content:\"\";width:8px;height:8px;border-radius:50%;background:var(--red);flex:0 0 8px;\n  }\n\n  /* \u2500\u2500 Strategic Advisory (NEW section) \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */\n  .advisory{\n    background:linear-gradient(180deg,var(--paper-2),var(--paper));\n    position:relative;overflow:hidden;\n  }\n  .advisory::before{\n    content:\"\";position:absolute;top:-100px;left:-100px;width:400px;height:400px;border-radius:50%;\n    background:radial-gradient(circle,rgba(230,60,80,.10),transparent 65%);\n  }\n  .advisory-tag{\n    display:inline-flex;align-items:center;gap:10px;\n    background:var(--navy-900);color:#fff;\n    padding:9px 18px;border-radius:999px;font-size:12.5px;font-weight:700;\n    letter-spacing:.16em;text-transform:uppercase;\n  }\n  .advisory-tag::before{\n    content:\"\";width:8px;height:8px;border-radius:50%;background:var(--red);\n    box-shadow:0 0 0 4px rgba(230,60,80,.25);\n  }\n  .advisory-grid{\n    display:grid;grid-template-columns:repeat(2,1fr);gap:24px;\n  }\n  @media (max-width:820px){ .advisory-grid{grid-template-columns:1fr} }\n  .advisory-card{\n    background:#fff;border:1px solid var(--line);border-radius:22px;\n    padding:36px;position:relative;\n    transition:border-color .2s ease, transform .2s ease;\n  }\n  .advisory-card:hover{border-color:var(--red);transform:translateY(-3px)}\n  .advisory-ico{\n    width:54px;height:54px;border-radius:14px;display:grid;place-items:center;\n    background:var(--navy-900);color:#fff;margin-bottom:22px;\n  }\n  .advisory-card h3{\n    font-size:22px;color:var(--navy-900);font-weight:800;margin-bottom:10px;line-height:1.2;\n  }\n  .advisory-card > p{color:var(--muted);font-size:15.5px;line-height:1.6;margin-bottom:18px}\n  .advisory-list{list-style:none;padding:0;margin:0;display:flex;flex-direction:column;gap:10px}\n  .advisory-list li{\n    display:flex;align-items:flex-start;gap:10px;\n    font-size:15px;color:var(--ink);\n  }\n  .advisory-list li::before{\n    content:\"\";display:inline-block;width:18px;height:18px;flex:0 0 18px;margin-top:3px;\n    background:url(\"data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23e63c50' stroke-width='2.5' stroke-linecap='round' stroke-linejoin='round'><path d='M4 12l5 5 11-11'/></svg>\") center/contain no-repeat;\n  }\n\n  /* \u2500\u2500 Services \u2014 buyers \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */\n  .buyer{\n    background:#fff;\n  }\n  .buyer-layout{\n    display:grid;grid-template-columns:1fr 1.1fr;gap:64px;align-items:start;\n  }\n  @media (max-width:960px){ .buyer-layout{grid-template-columns:1fr;gap:32px} }\n  .buyer-quote{\n    background:var(--paper);border:1px solid var(--line);border-radius:24px;padding:36px;\n    position:sticky;top:100px;\n  }\n  .buyer-quote .mark{\n    font-family:'Frank Ruhl Libre',serif;font-size:80px;line-height:.6;color:var(--red);\n    display:block;height:32px;\n  }\n  .buyer-quote blockquote{\n    margin:0;font-size:22px;color:var(--navy-900);font-weight:500;line-height:1.45;\n  }\n  .buyer-quote cite{\n    display:block;margin-top:24px;font-style:normal;color:var(--muted);font-size:14px;\n    border-top:1px solid var(--line);padding-top:18px;\n  }\n  .questions{display:flex;flex-direction:column;gap:18px}\n  .qrow{\n    background:var(--paper);border:1px solid var(--line);border-radius:18px;\n    padding:24px 28px;display:flex;align-items:flex-start;gap:20px;\n    transition:border-color .2s ease;\n  }\n  .qrow:hover{border-color:var(--navy-900)}\n  .qmark{\n    flex:0 0 52px;height:52px;border-radius:14px;\n    background:var(--navy-900);color:#fff;\n    display:grid;place-items:center;\n    font-family:'Frank Ruhl Libre',serif;font-size:28px;font-weight:900;\n  }\n  .qbody h4{font-size:19px;color:var(--navy-900);margin-bottom:6px}\n  .qbody p{color:var(--muted);font-size:15px}\n\n  /* \u2500\u2500 Process timeline \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */\n  .process{\n    background:var(--paper);\n  }\n  .process-track{\n    position:relative;display:grid;grid-template-columns:repeat(4,1fr);gap:24px;\n  }\n  @media (max-width:820px){ .process-track{grid-template-columns:1fr;gap:18px} }\n  .process-track::before{\n    content:\"\";position:absolute;top:30px;right:5%;left:5%;height:2px;\n    background:repeating-linear-gradient(to left, var(--red) 0 8px, transparent 8px 16px);\n    z-index:0;\n  }\n  @media (max-width:820px){ .process-track::before{display:none} }\n  .pstep{position:relative;text-align:center;background:transparent;z-index:1}\n  .pstep .node{\n    width:60px;height:60px;border-radius:50%;\n    background:var(--paper);border:2px solid var(--red);\n    color:var(--navy-900);font-family:'Frank Ruhl Libre',serif;font-weight:900;font-size:22px;\n    display:grid;place-items:center;margin:0 auto 22px;\n    box-shadow:0 0 0 8px var(--paper);\n    transition:transform .2s ease, background .2s ease, color .2s ease;\n  }\n  .pstep:hover .node{transform:scale(1.05);background:var(--red);color:#fff}\n  .pstep h4{\n    font-size:19px;color:var(--navy-900);margin-bottom:8px;\n  }\n  .pstep p{color:var(--muted);font-size:14.5px;line-height:1.55;max-width:240px;margin:0 auto}\n\n  /* \u2500\u2500 About / Mission with photo \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */\n  .about{\n    background:var(--navy-900);color:#fff;position:relative;overflow:hidden;\n  }\n  .about::before{\n    content:\"\";position:absolute;inset:0;\n    background:\n      radial-gradient(1000px 500px at 100% 0%, rgba(230,60,80,.24), transparent 55%),\n      radial-gradient(700px 400px at 0% 100%, rgba(255,255,255,.05), transparent 60%);\n  }\n  .about-grid{\n    position:relative;\n    display:grid;grid-template-columns:1fr 1.1fr;gap:64px;align-items:center;\n  }\n  @media (max-width:960px){ .about-grid{grid-template-columns:1fr} }\n  .about-photo{\n    position:relative;aspect-ratio:4/5;border-radius:24px;overflow:hidden;\n    box-shadow:var(--shadow-lg);\n  }\n  .about-photo img{\n    width:100%;height:100%;object-fit:cover;object-position:center 18%;display:block;\n  }\n  .about-photo::after{\n    content:\"\";position:absolute;inset:auto 0 0 0;height:40%;z-index:1;\n    background:linear-gradient(to top, rgba(10,26,63,.85), transparent);\n  }\n  .about-tag{\n    position:absolute;left:20px;bottom:20px;z-index:2;color:#fff;\n  }\n  .about-tag strong{font-family:'Frank Ruhl Libre',serif;font-size:22px;display:block}\n  .about-tag span{font-size:12px;letter-spacing:.14em;text-transform:uppercase;opacity:.8;color:#fff}\n  .about-copy .eyebrow{color:#fff;opacity:.8}\n  .about-copy .eyebrow::before{background:#fff}\n  .about-copy h2{\n    font-size:clamp(36px,4.6vw,60px);margin-top:20px;color:#fff;line-height:1.05;\n  }\n  .about-copy h2 .strike{\n    display:inline-block;padding:0 6px;background:var(--red);color:#fff;\n    transform:skew(-6deg);\n  }\n  .about-copy > p{\n    margin-top:26px;font-size:18px;color:rgba(255,255,255,.78);line-height:1.65;max-width:520px;\n  }\n  .values{\n    margin-top:40px;display:grid;grid-template-columns:repeat(3,1fr);gap:14px;\n  }\n  @media (max-width:520px){ .values{grid-template-columns:1fr} }\n  .value{\n    border:1px solid rgba(255,255,255,.14);border-radius:16px;padding:20px;\n    background:rgba(255,255,255,.04);\n  }\n  .value strong{font-family:'Frank Ruhl Libre',serif;font-size:22px;display:block;margin-bottom:4px}\n  .value span{color:rgba(255,255,255,.7);font-size:13.5px;line-height:1.5}\n\n  /* \u2500\u2500 Contact / CTA \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */\n  .contact{\n    background:var(--paper);\n  }\n  .contact-card{\n    background:#fff;border:1px solid var(--line);border-radius:28px;\n    padding:56px;\n    display:grid;grid-template-columns:1.2fr 1fr;gap:48px;align-items:center;\n    box-shadow:var(--shadow-md);position:relative;overflow:hidden;\n  }\n  @media (max-width:880px){ .contact-card{grid-template-columns:1fr;padding:36px} }\n  .contact-card::before{\n    content:\"\";position:absolute;top:-80px;left:-80px;width:280px;height:280px;\n    border-radius:50%;background:radial-gradient(circle,rgba(230,60,80,.14),transparent 65%);\n  }\n  .contact-card h2{\n    font-size:clamp(32px,3.6vw,46px);color:var(--navy-900);\n  }\n  .contact-card > div > p{color:var(--muted);font-size:17px;margin-top:14px;max-width:520px}\n  .contact-actions{display:flex;flex-direction:column;gap:14px;position:relative}\n  .contact-tile{\n    display:flex;align-items:center;gap:18px;\n    border:1px solid var(--line);border-radius:18px;padding:18px 22px;\n    transition:border-color .2s ease, transform .2s ease;\n  }\n  .contact-tile:hover{border-color:var(--navy-900);transform:translateX(-3px)}\n  .contact-ico{\n    width:52px;height:52px;border-radius:14px;display:grid;place-items:center;flex:0 0 52px;\n    background:var(--navy-900);color:#fff;\n  }\n  .contact-ico.wa{background:var(--whatsapp)}\n  .contact-ico.red{background:var(--red)}\n  .contact-tile .label{font-size:12.5px;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;display:block}\n  .contact-tile .value{font-size:22px;font-weight:700;color:var(--navy-900);display:block;margin-top:2px}\n  .contact-tile.tel .value{direction:ltr;text-align:right}\n  .contact-tile.mail .value{font-size:17px;direction:ltr;text-align:right}\n\n  /* \u2500\u2500 Footer \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */\n  footer{\n    background:var(--navy-900);color:rgba(255,255,255,.7);padding:56px 0 28px;\n  }\n  .foot-grid{\n    display:grid;grid-template-columns:2fr 1fr 1fr;gap:32px;align-items:start;\n  }\n  @media (max-width:760px){ .foot-grid{grid-template-columns:1fr} }\n  .foot-grid h4{color:#fff;font-size:14px;letter-spacing:.12em;text-transform:uppercase;margin-bottom:14px}\n  .foot-grid a, .foot-grid li{font-size:15px;line-height:2;color:rgba(255,255,255,.7)}\n  .foot-grid ul{list-style:none;padding:0;margin:0}\n  .foot-grid a:hover{color:#fff}\n  .foot-brand strong{color:#fff;font-family:'Frank Ruhl Libre',serif;font-size:28px;display:block}\n  .foot-brand p{margin-top:10px;max-width:380px;color:rgba(255,255,255,.65)}\n  .copyright{\n    margin-top:40px;padding-top:20px;border-top:1px solid rgba(255,255,255,.12);\n    display:flex;justify-content:space-between;flex-wrap:wrap;gap:10px;\n    font-size:13px;color:rgba(255,255,255,.5);\n  }\n\n  /* \u2500\u2500 Icons \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u250
